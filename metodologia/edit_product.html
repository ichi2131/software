<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Producto</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .user-info {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.9);
            padding: 10px 15px;
            border-radius: var(--border-radius);
            font-size: 0.9em;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 100;
        }

        .user-badge {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-light) 100%);
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.8em;
        }

        .logout-btn {
            background: var(--delete-color);
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: var(--border-radius);
            cursor: pointer;
            font-size: 0.9em;
            transition: background 0.3s;
        }

        .logout-btn:hover {
            background: var(--delete-hover);
        }

        body {
            position: relative;
        }
    </style>
</head>
<body>
    <div class="user-info">
        <span id="userName">Usuario</span>
        <span id="userRole" class="user-badge">Rol</span>
        <a href="index.html" class="home-btn" style="background: var(--primary-color); color: white; border: none; padding: 5px 10px; border-radius: var(--border-radius); cursor: pointer; font-size: 0.9em; text-decoration: none; display: inline-block;">🏠 Inicio</a>
        <button class="logout-btn" onclick="handleLogout()">Salir</button>
    </div>

    <!-- Header será renderizado por JavaScript -->

    <nav>
        <a href="index.html">Inicio</a>
        <a href="view_inventory.html">Ver Inventario</a>
    </nav>
    <h1>Editar Producto</h1>
    <form id="editForm">
        <label for="name">Nombre del Producto:</label>
        <input type="text" id="name" required>

        <label for="description">Descripción:</label>
        <textarea id="description" rows="4"></textarea>

        <label for="quantity">Cantidad:</label>
        <input type="number" id="quantity" min="0" required>

        <label for="price">Precio:</label>
        <input type="number" id="price" step="0.01" min="0" required>

        <label for="category">Categoría:</label>
        <select id="category" required>
            <option value="Electrónicos">Electrónicos</option>
            <option value="Ropa">Ropa</option>
            <option value="Alimentos">Alimentos</option>
            <option value="Hogar">Hogar</option>
            <option value="Otros">Otros</option>
        </select>

        <label for="supplier">Proveedor:</label>
        <input type="text" id="supplier">

        <button type="submit">Actualizar Producto</button>
     </form>

    <script src="app.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const productId = parseInt(urlParams.get('id'));

        window.addEventListener('DOMContentLoaded', () => {
            checkAuth();
            const user = getCurrentUser();
            document.getElementById('userName').textContent = user.fullName || user.username;
            document.getElementById('userRole').textContent = user.role.toUpperCase();

            // Renderizar header y footer
            renderHeader();
            renderFooter();

            if (!hasPermission('edit_product')) {
                document.body.innerHTML = '<div class="container"><h2>❌ Acceso Denegado</h2><p>No tienes permiso para editar productos. Solo el administrador puede realizar esta acción.</p></div>';
                return;
            }

            loadProduct();
        });

        function loadProduct() {
            const inventory = getInventory();
            const product = inventory.find(p => p.id === productId);
            if (product) {
                document.getElementById('name').value = product.name;
                document.getElementById('description').value = product.description;
                document.getElementById('quantity').value = product.quantity;
                document.getElementById('price').value = product.price;
                document.getElementById('category').value = product.category;
                document.getElementById('supplier').value = product.supplier;
            }
        }

        document.getElementById('editForm').addEventListener('submit', function(e) {
            e.preventDefault();
            let inventory = getInventory();
            const index = inventory.findIndex(p => p.id === productId);
            if (index !== -1) {
                inventory[index] = {
                    ...inventory[index],
                    name: document.getElementById('name').value,
                    description: document.getElementById('description').value,
                    quantity: parseInt(document.getElementById('quantity').value),
                    price: parseFloat(document.getElementById('price').value),
                    category: document.getElementById('category').value,
                    supplier: document.getElementById('supplier').value
                };
                localStorage.setItem('inventory', JSON.stringify(inventory));
                alert('Producto actualizado exitosamente!');
                window.location.href = 'view_inventory.html';
            }
        });

        function handleLogout() {
            if (confirm('¿Deseas cerrar sesión?')) {
                logout();
                window.location.href = 'login.html';
            }
        }
    </script>
</body>
</html>
