<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Cuenta</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--bg-gradient-1) 0%, var(--bg-gradient-2) 100%) !important;
        }

        .signup-container {
            background: white;
            padding: 40px;
            border-radius: var(--border-radius);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 450px;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .signup-container h1 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 10px;
            font-size: 2em;
        }

        .signup-container p {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-color);
            font-weight: 500;
        }

        input[type="text"],
        input[type="password"],
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--border-color);
            border-radius: var(--border-radius);
            font-size: 1em;
            font-family: var(--font-family);
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .signup-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-light) 100%);
            color: white;
            border: none;
            border-radius: var(--border-radius);
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            margin-top: 10px;
        }

        .signup-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(33, 150, 243, 0.4);
        }

        .error-message {
            color: var(--error-text);
            background-color: var(--error-bg);
            padding: 12px;
            border-radius: var(--border-radius);
            margin-bottom: 20px;
            display: none;
        }

        .success-message {
            color: var(--success-text);
            background-color: var(--success-bg);
            padding: 12px;
            border-radius: var(--border-radius);
            margin-bottom: 20px;
            display: none;
        }

        .login-link {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
        }

        .login-link a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: bold;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        .role-info {
            background-color: var(--bg-gradient-1);
            padding: 12px;
            border-radius: var(--border-radius);
            font-size: 0.85em;
            margin-top: 8px;
            color: #666;
        }

        header,
        nav {
            display: none;
        }
    </style>
</head>
<body>
    <div class="signup-container">
        <h1>📝 Crear Cuenta</h1>
        <p>Regístrate para acceder a nuestro sistema</p>

        <div id="errorMessage" class="error-message"></div>
        <div id="successMessage" class="success-message"></div>

        <form id="signupForm" onsubmit="handleSignup(event)">
            <div class="form-group">
                <label for="fullName">Nombre Completo:</label>
                <input type="text" id="fullName" required placeholder="Tu nombre completo">
            </div>

            <div class="form-group">
                <label for="username">Usuario:</label>
                <input type="text" id="username" required placeholder="Nombre de usuario único">
                <div class="role-info">Mínimo 3 caracteres, sin espacios</div>
            </div>

            <div class="form-group">
                <label for="password">Contraseña:</label>
                <input type="password" id="password" required placeholder="Contraseña segura">
                <div class="role-info">Mínimo 6 caracteres</div>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirmar Contraseña:</label>
                <input type="password" id="confirmPassword" required placeholder="Repite tu contraseña">
            </div>

            <div class="form-group">
                <label for="role">Tipo de Cuenta:</label>
                <select id="role" onchange="updateRoleInfo()" disabled>
                    <option value="buyer">Comprador - Acceso a catálogo y carrito</option>
                </select>
                <div id="roleDescription" class="role-info">
                    Como comprador podrás: ver catálogo, agregar al carrito y completar compras.
                </div>
            </div>

            <button type="submit" class="signup-btn">✓ Crear Cuenta</button>
        </form>

        <div class="login-link">
            ¿Ya tienes cuenta? <a href="login.html">Inicia sesión aquí</a>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        function updateRoleInfo() {
            // Solo Comprador disponible para signup
            document.getElementById('roleDescription').textContent = 'Como comprador podrás: ver catálogo, agregar al carrito y completar compras.';
        }

        function handleSignup(event) {
            event.preventDefault();

            const fullName = document.getElementById('fullName').value;
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const role = document.getElementById('role').value;

            const errorDiv = document.getElementById('errorMessage');
            const successDiv = document.getElementById('successMessage');

            // Ocultar mensajes anteriores
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';

            // Validaciones
            if (!fullName || !username || !password || !confirmPassword) {
                showError('Todos los campos son requeridos');
                return;
            }

            if (password !== confirmPassword) {
                showError('Las contraseñas no coinciden');
                return;
            }

            if (username.includes(' ')) {
                showError('El usuario no puede contener espacios');
                return;
            }

            // Registrar usuario
            const result = registerUser(username, password, fullName, role);

            if (result.success) {
                successDiv.textContent = '✓ Cuenta creada exitosamente. Redirigiendo...';
                successDiv.style.display = 'block';

                // Redirigir al login después de 2 segundos
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);
            } else {
                showError(result.message);
            }
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = '❌ ' + message;
            errorDiv.style.display = 'block';
        }
    </script>
</body>
</html>
