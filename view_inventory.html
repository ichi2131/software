<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ver Inventario</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .user-info {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.9);
            padding: 10px 15px;
            border-radius: var(--border-radius);
            font-size: 0.9em;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 100;
        }

        .user-badge {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-light) 100%);
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.8em;
        }

        .logout-btn {
            background: var(--delete-color);
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: var(--border-radius);
            cursor: pointer;
            font-size: 0.9em;
            transition: background 0.3s;
        }

        .logout-btn:hover {
            background: var(--delete-hover);
        }

        body {
            position: relative;
        }
    </style>
</head>
<body>
    <div class="user-info">
        <span id="userName">Usuario</span>
        <span id="userRole" class="user-badge">Rol</span>
        <a href="index.html" class="home-btn" style="background: var(--primary-color); color: white; border: none; padding: 5px 10px; border-radius: var(--border-radius); cursor: pointer; font-size: 0.9em; text-decoration: none; display: inline-block;">🏠 Inicio</a>
        <button class="logout-btn" onclick="handleLogout()">Salir</button>
    </div>

    <!-- Header será renderizado por JavaScript -->

    <nav>
        <a href="index.html">Inicio</a>
        <a href="add_product.html" id="navAdd">Agregar Producto</a>
    </nav>
    <h1>Inventario de Productos</h1>
    <table id="inventoryTable">
        <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Descripción</th>
                <th>Cantidad</th>
                <th id="priceHeader">Precio</th>
                <th>Categoría</th>
                <th>Proveedor</th>
                <th>Fecha Agregado</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <script src="app.js"></script>
    <script>
        window.addEventListener('DOMContentLoaded', () => {
            checkAuth();
            const user = getCurrentUser();
            document.getElementById('userName').textContent = user.fullName || user.username;
            document.getElementById('userRole').textContent = user.role.toUpperCase();

            // Renderizar header y footer
            renderHeader();
            renderFooter();

            if (!hasPermission('view_inventory')) {
                document.body.innerHTML = '<div class="container"><h2>❌ Acceso Denegado</h2><p>No tienes permiso para ver el inventario.</p></div>';
                return;
            }

            if (!hasPermission('add_product')) {
                document.getElementById('navAdd').style.display = 'none';
            }

            if (!hasPermission('view_prices')) {
                document.getElementById('priceHeader').style.display = 'none';
            }

            loadInventory();
        });

        function loadInventory() {
            const inventory = getInventory();
            const tbody = document.querySelector('#inventoryTable tbody');
            tbody.innerHTML = '';
            const user = getCurrentUser();
            
            inventory.forEach(product => {
                const row = document.createElement('tr');
                if (product.quantity < 10) row.classList.add('low-stock');
                
                let actionsHTML = '';
                if (hasPermission('edit_product')) {
                    actionsHTML += `<button class="edit" onclick="editProduct(${product.id})">Editar</button>`;
                }
                if (hasPermission('delete_product')) {
                    actionsHTML += `<button class="delete" onclick="deleteProduct(${product.id})">Eliminar</button>`;
                }

                let priceCell = hasPermission('view_prices') 
                    ? `<td>$${product.price.toFixed(2)}</td>` 
                    : '<td style="display: none;">--</td>';

                row.innerHTML = `
                    <td>${product.id}</td>
                    <td>${product.name}</td>
                    <td>${product.description}</td>
                    <td>${product.quantity}</td>
                    ${priceCell}
                    <td>${product.category}</td>
                    <td>${product.supplier}</td>
                    <td>${new Date(product.dateAdded).toLocaleDateString()}</td>
                    <td>${actionsHTML || '—'}</td>
                `;
                tbody.appendChild(row);
            });
        }

        function editProduct(id) {
            window.location.href = `edit_product.html?id=${id}`;
        }

        function deleteProduct(id) {
            if (confirm('¿Está seguro de que desea eliminar este producto?')) {
                let inventory = getInventory();
                inventory = inventory.filter(product => product.id !== id);
                localStorage.setItem('inventory', JSON.stringify(inventory));
                loadInventory();
            }
        }

        function handleLogout() {
            if (confirm('¿Deseas cerrar sesión?')) {
                logout();
                window.location.href = 'login.html';
            }
        }
    </script>
</body>
</html>
